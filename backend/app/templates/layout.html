<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}College ERP{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .sidebar-transition {
            transition: transform 0.3s ease-in-out;
        }
        .sidebar-open {
            transform: translateX(0);
        }
        .sidebar-closed {
            transform: translateX(-100%);
        }
        .dark {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --border-color: #334155;
        }
        .light {
            --bg-primary: #ffffff;
            --bg-secondary: #f8fafc;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --border-color: #e2e8f0;
        }
        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
        }
        .card {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
        }
        .btn-primary {
            background-color: #3b82f6;
            color: white;
        }
        .btn-primary:hover {
            background-color: #2563eb;
        }
        .dark .btn-primary {
            background-color: #60a5fa;
        }
        .dark .btn-primary:hover {
            background-color: #3b82f6;
        }
    </style>
</head>
<body class="h-full flex">
    <!-- Sidebar -->
    <div id="sidebar" class="fixed inset-y-0 left-0 z-50 w-64 bg-gray-900 dark:bg-gray-800 sidebar-transition sidebar-closed lg:sidebar-open lg:static lg:inset-0">
        <div class="flex items-center justify-center h-16 px-4 bg-gray-800 dark:bg-gray-700">
            <div class="flex items-center space-x-2">
                <i data-lucide="graduation-cap" class="w-8 h-8 text-white"></i>
                <span class="text-xl font-bold text-white">College ERP</span>
            </div>
        </div>
        <nav class="mt-8 px-4">
            <div class="space-y-2">
                {% block sidebar_links %}
                <!-- Links will be defined in child templates -->
                {% endblock %}
            </div>
        </nav>
    </div>

    <!-- Main content -->
    <div class="flex-1 flex flex-col lg:ml-0">
        <!-- Topbar -->
        <header class="bg-white dark:bg-gray-800 shadow-sm border-b border-gray-200 dark:border-gray-700">
            <div class="flex items-center justify-between h-16 px-4">
                <div class="flex items-center">
                    <button id="sidebarToggle" class="lg:hidden p-2 rounded-md text-gray-500 hover:text-gray-700 hover:bg-gray-100 dark:hover:bg-gray-700">
                        <i data-lucide="menu" class="w-6 h-6"></i>
                    </button>
                    <h1 class="ml-4 text-xl font-semibold text-gray-900 dark:text-white">{% block page_title %}Dashboard{% endblock %}</h1>
                </div>
                <div class="flex items-center space-x-4">
                    <button id="themeToggle" class="p-2 rounded-md text-gray-500 hover:text-gray-700 hover:bg-gray-100 dark:hover:bg-gray-700">
                        <i data-lucide="sun" class="w-6 h-6 dark:hidden"></i>
                        <i data-lucide="moon" class="w-6 h-6 hidden dark:block"></i>
                    </button>
                    <div class="flex items-center space-x-2">
                        <div class="w-8 h-8 bg-blue-500 rounded-full flex items-center justify-center">
                            <span class="text-white text-sm font-medium">{{ current_user.email[0].upper() }}</span>
                        </div>
                        <span class="text-sm text-gray-700 dark:text-gray-300">{{ current_user.email }}</span>
                    </div>
                    <button id="logoutBtn" class="px-4 py-2 text-sm font-medium text-white bg-red-600 hover:bg-red-700 rounded-md">
                        Logout
                    </button>
                </div>
            </div>
        </header>

        <!-- Page content -->
        <main class="flex-1 overflow-y-auto p-6">
            {% block content %}
            <!-- Page content goes here -->
            {% endblock %}
        </main>
    </div>

    <!-- Overlay for mobile sidebar -->
    <div id="sidebarOverlay" class="fixed inset-0 z-40 bg-black bg-opacity-50 lg:hidden hidden"></div>

    <script>
        // Theme management
        function initTheme() {
            const theme = localStorage.getItem('theme') || 'light';
            document.documentElement.classList.toggle('dark', theme === 'dark');
            updateThemeIcon();
        }

        function toggleTheme() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateThemeIcon();
        }

        function updateThemeIcon() {
            const sunIcon = document.querySelector('[data-lucide="sun"]');
            const moonIcon = document.querySelector('[data-lucide="moon"]');
            const isDark = document.documentElement.classList.contains('dark');

            if (sunIcon && moonIcon) {
                sunIcon.classList.toggle('hidden', isDark);
                moonIcon.classList.toggle('hidden', !isDark);
            }
        }

        // Sidebar management
        function initSidebar() {
            const sidebar = document.getElementById('sidebar');
            const sidebarToggle = document.getElementById('sidebarToggle');
            const sidebarOverlay = document.getElementById('sidebarOverlay');

            function toggleSidebar() {
                const isOpen = sidebar.classList.contains('sidebar-open');
                sidebar.classList.toggle('sidebar-open', !isOpen);
                sidebar.classList.toggle('sidebar-closed', isOpen);
                sidebarOverlay.classList.toggle('hidden', isOpen);
            }

            sidebarToggle.addEventListener('click', toggleSidebar);
            sidebarOverlay.addEventListener('click', toggleSidebar);
        }

        // Logout functionality
        function initLogout() {
            const logoutBtn = document.getElementById('logoutBtn');
            logoutBtn.addEventListener('click', function() {
                localStorage.removeItem('token');
                window.location.href = '/login';
            });
        }

        // Initialize everything
        document.addEventListener('DOMContentLoaded', function() {
            initTheme();
            initSidebar();
            initLogout();
            lucide.createIcons();

            // Theme toggle
            document.getElementById('themeToggle').addEventListener('click', toggleTheme);
        });
    </script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
