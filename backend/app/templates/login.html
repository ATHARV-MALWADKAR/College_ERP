<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College ERP - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        .login-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .dark .login-bg {
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
        }
        .dark .glass {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="login-bg min-h-screen flex items-center justify-center p-4">
    <div class="glass rounded-2xl p-8 w-full max-w-md shadow-2xl">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-white/20 rounded-full mb-4">
                <i data-lucide="graduation-cap" class="w-8 h-8 text-white"></i>
            </div>
            <h1 class="text-3xl font-bold text-white mb-2">College ERP</h1>
            <p class="text-white/80">Sign in to your account</p>
        </div>

        <form id="loginForm" class="space-y-6">
            <div>
                <label for="email" class="block text-sm font-medium text-white/90 mb-2">
                    Email Address
                </label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    required
                    class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-lg text-white placeholder-white/50 focus:outline-none focus:ring-2 focus:ring-white/50 focus:border-transparent"
                    placeholder="Enter your email"
                >
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-white/90 mb-2">
                    Password
                </label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    required
                    class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-lg text-white placeholder-white/50 focus:outline-none focus:ring-2 focus:ring-white/50 focus:border-transparent"
                    placeholder="Enter your password"
                >
            </div>

            <button
                type="submit"
                id="loginBtn"
                class="w-full bg-white text-purple-600 py-3 px-4 rounded-lg font-semibold hover:bg-white/90 focus:outline-none focus:ring-2 focus:ring-white/50 transition duration-200 flex items-center justify-center"
            >
                <span id="btnText">Sign In</span>
                <div id="loadingSpinner" class="hidden ml-2 w-4 h-4 border-2 border-purple-600 border-t-transparent rounded-full animate-spin"></div>
            </button>
        </form>

        <div id="errorMessage" class="mt-4 p-3 bg-red-500/20 border border-red-500/30 rounded-lg text-red-100 text-sm hidden">
            <div class="flex items-center">
                <i data-lucide="alert-circle" class="w-4 h-4 mr-2"></i>
                <span id="errorText"></span>
            </div>
        </div>

        <div class="mt-6 text-center">
            <p class="text-white/60 text-sm">
                Demo credentials: admin@college.edu / admin123
            </p>
        </div>
    </div>

    <script>
        // Theme toggle functionality
        function initTheme() {
            const theme = localStorage.getItem('theme') || 'light';
            document.documentElement.classList.toggle('dark', theme === 'dark');
        }

        // Initialize theme on page load
        initTheme();

        // Login form handling
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            const btnText = document.getElementById('btnText');
            const loadingSpinner = document.getElementById('loadingSpinner');
            const errorMessage = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');

            // Show loading state
            loginBtn.disabled = true;
            btnText.textContent = 'Signing in...';
            loadingSpinner.classList.remove('hidden');
            errorMessage.classList.add('hidden');

            try {
                const response = await fetch('/api/v1/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        email: email,
                        password: password
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    // Store token
                    localStorage.setItem('token', data.access_token);

                    // Redirect based on role
                    const payload = JSON.parse(atob(data.access_token.split('.')[1]));
                    const role = payload.role;

                    let redirectUrl = '/dashboard';
                    if (role === 'admin') {
                        redirectUrl = '/admin';
                    } else if (role === 'faculty') {
                        redirectUrl = '/faculty';
                    } else if (role === 'student') {
                        redirectUrl = '/student';
                    }

                    window.location.href = redirectUrl;
                } else {
                    throw new Error(data.detail || 'Login failed');
                }
            } catch (error) {
                errorText.textContent = error.message;
                errorMessage.classList.remove('hidden');
            } finally {
                // Reset loading state
                loginBtn.disabled = false;
                btnText.textContent = 'Sign In';
                loadingSpinner.classList.add('hidden');
            }
        });

        // Initialize Lucide icons
        lucide.createIcons();
    </script>
</body>
</html>
