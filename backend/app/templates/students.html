<!DOCTYPE html>
<html>
<head>
<title>Students</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-10">

<h1 class="text-3xl font-bold mb-6">Students</h1>

<form method="post" action="/students/add" class="bg-white p-6 rounded shadow mb-10">

<div class="mb-4">
<label>Name</label>
<input name="name" class="border p-2 w-full">
</div>

<div class="mb-4">
<label>Email</label>
<input name="email" class="border p-2 w-full">
</div>

<div class="mb-4">
<label>Department</label>
<input name="department" class="border p-2 w-full">
</div>

<button class="bg-blue-600 text-white px-4 py-2 rounded">
Add Student
</button>

</form>

<h2 class="text-xl font-bold mb-4">Student List</h2>

<ul>

{% for student in students %}

<li class="bg-white p-3 mb-2 rounded shadow">
{{ student.name }} — {{ student.email }} — {{ student.department }}
</li>

{% endfor %}

</ul>

</body>
</html>
